<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimeX Full Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
.header{padding:20px;background:#0b0b0b;border-bottom:1px solid #222;}
h1{color:gold;}
button{padding:12px 20px;background:gold;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}
.card{background:#111;border:1px solid rgba(255,215,0,.4);padding:20px;margin:20px auto;width:95%;max-width:550px;border-radius:12px}
input,select{width:95%;padding:10px;margin-top:10px;background:#000;border:1px solid #333;color:#fff;border-radius:6px}
#adminSection{display:none}
</style>
</head>

<body>

<div class="header">
<h1>DimeX Admin Control</h1>
<button onclick="connectWallet()">Connect Admin Wallet</button>
<div id="walletDisplay" style="margin-top:10px;color:gold"></div>
</div>

<div id="adminSection">

<div class="card">
<h3>Pause Control</h3>
<button onclick="pauseStaking()">Pause</button>
<button onclick="unpauseStaking()">Unpause</button>
</div>

<div class="card">
<h3>Plan Reward Rate</h3>
<input id="rateDays" placeholder="Duration (90 / 180 / 365)">
<input id="ratePercent" placeholder="New Percent">
<button onclick="updateRate()">Update Rate</button>
</div>

<div class="card">
<h3>Minimum Stake</h3>
<input id="minUSDT" placeholder="Min USDT">
<button onclick="setMinUSDT()">Update USDT</button>
<input id="minDMX" placeholder="Min DMX">
<button onclick="setMinDMX()">Update DMX</button>
</div>

<div class="card">
<h3>Emergency Withdraw</h3>
<select id="withdrawToken">
<option value="USDT">USDT</option>
<option value="DMX">DMX</option>
</select>
<input id="withdrawAmount" placeholder="Amount">
<button onclick="emergencyWithdraw()">Withdraw</button>
</div>

<div class="card">
<h3>Treasury</h3>
<input id="newTreasury" placeholder="New Treasury Address">
<button onclick="updateTreasury()">Update</button>
</div>

<div class="card">
<h3>Ownership</h3>
<input id="newOwner" placeholder="New Owner Address">
<button onclick="transferOwner()">Transfer</button>
</div>

<div class="card">
<h3>Direct Bonus %</h3>
<input id="directPercent" placeholder="New Direct %">
<button onclick="updateDirect()">Update</button>
</div>

<div class="card">
<h3>Level Bonus %</h3>
<input id="levelNumber" placeholder="Level (1-25)">
<input id="levelPercent" placeholder="Percent">
<button onclick="updateLevel()">Update</button>
</div>

<div class="card">
<h3>DMX Price Control</h3>
<input id="manualPrice" placeholder="Manual Price">
<button onclick="setManualPrice()">Set Price</button>

<select id="priceMode">
<option value="true">Enable Manual</option>
<option value="false">Use Live</option>
</select>
<button onclick="togglePrice()">Update Mode</button>
</div>

</div>

<script>

const ADMIN = "0x53ba2d865be750d0e2d4d01bcb0a46ec1684c46b"
const STAKING_ADDRESS = "PUT_STAKING_CONTRACT"
const USDT = "0x55d398326f99059fF775485246999027B3197955"
const DMX = "PUT_DMX_TOKEN"

const ABI = [
"function pauseStaking() external",
"function unpauseStaking() external",
"function setRewardRate(uint256,uint256) external",
"function setMinimumUSDT(uint256) external",
"function setMinimumDMX(uint256) external",
"function emergencyWithdrawToken(address,uint256) external",
"function setTreasury(address) external",
"function transferOwnership(address) external",
"function setDirectPercent(uint256) external",
"function setLevelPercent(uint256,uint256) external",
"function setManualPrice(uint256) external",
"function toggleManualPrice(bool) external"
]

let provider, signer, contract
let connecting = false

// Detect wallet
window.addEventListener("load", () => {
  if(window.ethereum){
    document.getElementById("detect").innerHTML =
      "✅ Wallet Detected"
  } else {
    document.getElementById("detect").innerHTML =
      "❌ Open inside MetaMask / Trust Wallet"
  }
})

// Wallet change reload
if(window.ethereum){
  window.ethereum.on("accountsChanged", () => location.reload())
  window.ethereum.on("chainChanged", () => location.reload())
}

async function connectWallet(){

  if(connecting) return
  connecting = true

  try{

    if(!window.ethereum){
      alert("Open inside MetaMask / Trust Wallet browser")
      connecting = false
      return
    }

    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    })

    provider = new ethers.providers.Web3Provider(window.ethereum)
    signer = provider.getSigner()

    const network = await provider.getNetwork()

    // Switch to BSC
    if(network.chainId !== 56){
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x38" }]
      })
    }

    const address = accounts[0]

    document.getElementById("result").innerHTML =
      "Connected:<br>" + address +
      "<br><br>Network: BSC Mainnet (56)"

    // 🔐 ADMIN CHECK
    if(address.toLowerCase() !== ADMIN.toLowerCase()){
      alert("❌ Not Admin Wallet")
      connecting = false
      return
    }

    // ✅ Admin verified
    contract = new ethers.Contract(
      STAKING_ADDRESS,
      ABI,
      signer
    )

    document.getElementById("adminSection").style.display = "block"

  }catch(err){
    alert("Connection Failed: " + err.message)
    console.log(err)
  }

  connecting = false
}

/* FUNCTIONS */

async function pauseStaking(){await (await contract.pauseStaking()).wait();alert("Paused")}
async function unpauseStaking(){await (await contract.unpauseStaking()).wait();alert("Unpaused")}

async function updateRate(){
const d=document.getElementById("rateDays").value
const p=document.getElementById("ratePercent").value
await (await contract.setRewardRate(d*86400,p)).wait()
alert("Rate Updated")
}

async function setMinUSDT(){
const v=document.getElementById("minUSDT").value
await (await contract.setMinimumUSDT(ethers.utils.parseUnits(v,18))).wait()
alert("Min USDT Updated")
}

async function setMinDMX(){
const v=document.getElementById("minDMX").value
await (await contract.setMinimumDMX(ethers.utils.parseUnits(v,18))).wait()
alert("Min DMX Updated")
}

async function emergencyWithdraw(){
const token=document.getElementById("withdrawToken").value==="USDT"?USDT:DMX
const amt=document.getElementById("withdrawAmount").value
await (await contract.emergencyWithdrawToken(token,ethers.utils.parseUnits(amt,18))).wait()
alert("Withdraw Complete")
}

async function updateTreasury(){
const a=document.getElementById("newTreasury").value
await (await contract.setTreasury(a)).wait()
alert("Treasury Updated")
}

async function transferOwner(){
const a=document.getElementById("newOwner").value
await (await contract.transferOwnership(a)).wait()
alert("Ownership Transferred")
}

async function updateDirect(){
const v=document.getElementById("directPercent").value
await (await contract.setDirectPercent(v)).wait()
alert("Direct Updated")
}

async function updateLevel(){
const l=document.getElementById("levelNumber").value
const p=document.getElementById("levelPercent").value
await (await contract.setLevelPercent(l,p)).wait()
alert("Level Updated")
}

async function setManualPrice(){
const p=document.getElementById("manualPrice").value
await (await contract.setManualPrice(ethers.utils.parseUnits(p,18))).wait()
alert("Price Updated")
}

async function togglePrice(){
const m=document.getElementById("priceMode").value==="true"
await (await contract.toggleManualPrice(m)).wait()
alert("Mode Updated")
}

</script>
</body>
</html>
